title: Cached Domain Credentials Dumping
id: x4y5z6a7-b8c9-3456-efab-456789012789
status: stable
level: high
description: |
  Detects dumping of cached domain credentials from Windows Registry.
  Cached credentials allow offline password cracking without domain access.
references:
  - https://attack.mitre.org/techniques/T1003/005/
  - https://docs.microsoft.com/en-us/windows-server/security/credentials-management-and-protection/credential-guard
author: Detection Engineering Team
date: 2026/03/21
modified: 2026/03/21
tags:
  - attack.credential_access
  - attack.t1003.005
logsource:
  category: process_creation
  product: windows
detection:
  selection_reg_save:
    Image|endswith: '\reg.exe'
    CommandLine|contains: 'save'
  selection_cache_path:
    CommandLine|contains:
      - 'hklm\security\cache'
      - 'hklm\\security\\cache'
      - 'HKLM\SECURITY\Cache'
      - 'HKLM\\SECURITY\\Cache'
      - 'NL$KM'
  selection_mimikatz:
    Image|endswith:
      - '\mimikatz.exe'
    CommandLine|contains:
      - 'lsadump::cache'
      - 'sekurlsa::cred'
  condition: 1 of selection_*
falsepositives:
  - System backup operations (documented)
  - Forensic investigation tools (authorized)
fields:
  - Image
  - CommandLine
  - User
  - Computer
  - ProcessId
  - ParentImage
allowlist:
  - ParentImage: 'C:\Windows\System32\wbem\wmiprvse.exe'
    User: 'SYSTEM'
    Reason: 'Scheduled system backup'
  - Image: 'C:\Program Files\*\mimikatz.exe'
    Reason: 'Authorized security testing - verify authorization'
related:
  - id: y5z6a7b8-c9d0-4567-fabc-567890123890
    type: correlated
