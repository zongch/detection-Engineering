# Splunk Detection Rules - Expanded Set (12 New Rules)
# Compiled from Sigma YAML format
# Target Platform: Splunk with Sysmon Add-on
# Generated: 2026-03-22

# ============================================================================
# DEFENSE EVASION RULES (3 rules)
# ============================================================================

# Rule 1: Windows Defender Security Tool Disabled (T1562.001)
[windows_defender_disabled]
action = search
search = index=windows sourcetype=WinEventLog:Sysmon EventCode IN (12,13)
  TargetObject="*\\SOFTWARE\\Policies\\Microsoft\\Windows Defender*"
  OR TargetObject="*\\SOFTWARE\\Microsoft\\Windows Defender*"
  (Details="*DisableAntiSpyware*"
    OR Details="*DisableRealtimeMonitoring*"
    OR Details="*DisableBehaviorMonitoring*"
    OR Details="*DisableBlockAtFirstSeen*"
    OR Details="*DisableIOAVProtection*"
    OR Details="*DisablePrivacyMode*"
    OR Details="*DisableRoutinelyTakingAction*"
    OR Details="*DisableScanningNetworkFiles*"
    OR Details="*DisableScriptScanning*"
    OR Details="*ServiceKeepAlive*")
  (Details="*0x00000001*" OR Details="*1*")
| eval risk_score=90
| where NOT (Image="*\\msiexec.exe")
| table _time Computer User TargetObject Details risk_score
| sort - _time
| description Detects attempts to disable Windows Defender security features

# Rule 2: Windows Event Logging Disabled (T1562.004)
[windows_event_logging_disabled]
action = search
search = index=windows sourcetype=WinEventLog:Sysmon EventCode IN (12,13)
  TargetObject="*\\SYSTEM\\CurrentControlSet\\Services\\EventLog*"
  (Details="*Start*" OR Details="*File*")
  (Details="*4*" OR Details="*0*")
| eval risk_score=95
| table _time Computer User TargetObject Details risk_score
| sort - _time
| description Critical alert - attacker disabling event logging to destroy forensic evidence

# Rule 3: Hidden Files Creation via attrib Command (T1564.001)
[hidden_files_creation]
action = search
search = index=windows sourcetype=WinEventLog:Sysmon EventCode=1
  Image="*\\attrib.exe"
  (CommandLine="*+h*" OR CommandLine="*+h +s*")
| eval risk_score=50
| where NOT (ParentImage="*\\cmd.exe" AND CommandLine="*C:\\Windows\\System32\\attrib.exe*")
  AND NOT (CommandLine="*C:\\Windows\\*")
| table _time Computer User Image CommandLine ParentImage risk_score
| sort - _time
| description Detects creation of hidden files to conceal malware

# ============================================================================
# CREDENTIAL ACCESS RULES (4 rules)
# ============================================================================

# Rule 4: SAM Database Dumping via Reg.exe (T1003.002)
[sam_database_dump]
action = search
search = index=windows sourcetype=WinEventLog:Sysmon EventCode=1
  Image="*\\reg.exe"
  CommandLine="*save*"
  (CommandLine="*hklm\\sam*"
    OR CommandLine="*hklm\\\\sam*"
    OR CommandLine="*HKLM\\SAM*"
    OR CommandLine="*HKLM\\\\SAM*")
| eval risk_score=95
| where NOT (ParentImage="*\\wbem\\wmiprvse.exe" AND User="SYSTEM")
  AND NOT (ParentImage="*\\cmd.exe" AND User="SYSTEM")
| table _time Computer User Image CommandLine ParentImage risk_score
| sort - _time
| description Critical alert - SAM database dumping for local password hash extraction

# Rule 5: NTDS.dit Active Directory Database Extraction (T1003.003)
[ntds_database_extraction]
action = search
search = index=windows sourcetype=WinEventLog:Sysmon EventCode=1
  (Image="*\\cmd.exe" OR Image="*\\powershell.exe")
    AND (CommandLine="*\\Windows\\NTDS\\ntds.dit*" OR CommandLine="*ntds.dit*")
  OR (Image="*\\ntdsutil.exe"
    AND (CommandLine="*ifm*" OR CommandLine="*create*"))
  OR (Image="*\\vssadmin.exe"
    AND (CommandLine="*create*" OR CommandLine="*shadowcopy*"))
| eval risk_score=95
| where NOT (ParentImage="*\\wbem\\wmiprvse.exe" AND User="DOMAIN\\BackupAccount")
  AND NOT (Image="*\\vssadmin.exe" AND CommandLine="*create shadowcopy*" AND User="SYSTEM")
| table _time Computer User Image CommandLine ParentImage risk_score
| sort - _time
| description Critical alert - NTDS.dit extraction from Domain Controller

# Rule 6: Private Key File Access and Copy (T1552.004)
[private_key_access]
action = search
search = index=windows sourcetype=WinEventLog:Sysmon EventCode=10
  TargetFilename IN ("*.pem", "*.key", "*.p12", "*.pfx", "*.jks", "*.keystore")
  Image IN ("*\\cmd.exe", "*\\powershell.exe", "*\\wscript.exe", "*\\cscript.exe")
| eval risk_score=80
| where NOT (Image="*\\certutil.exe" AND TargetFilename="C:\\ProgramData\\*\\*.pfx")
  AND NOT (ParentImage="*\\msiexec.exe")
| table _time Computer User TargetFilename Image risk_score
| sort - _time
| description Detects access and copying of private key files for credential theft

# Rule 7: Cached Domain Credentials Dumping (T1003.005)
[cached_credentials_dump]
action = search
search = index=windows sourcetype=WinEventLog:Sysmon EventCode=1
  (Image="*\\reg.exe" AND CommandLine="*save*"
    AND (CommandLine="*hklm\\security\\cache*"
      OR CommandLine="*hklm\\\\security\\\\cache*"
      OR CommandLine="*HKLM\\SECURITY\\Cache*"
      OR CommandLine="*HKLM\\\\SECURITY\\Cache*"
      OR CommandLine="*NL$KM*"))
  OR (Image="*\\mimikatz.exe"
    AND (CommandLine="*lsadump::cache*" OR CommandLine="*sekurlsa::cred*"))
| eval risk_score=90
| where NOT (ParentImage="*\\wbem\\wmiprvse.exe" AND User="SYSTEM")
  AND NOT (Image="C:\\Program Files\\*\\mimikatz.exe")
| table _time Computer User Image CommandLine ParentImage risk_score
| sort - _time
| description Detects dumping of cached domain credentials

# ============================================================================
# DISCOVERY RULES (2 rules)
# ============================================================================

# Rule 8: Remote System Discovery via Network Commands (T1018)
[remote_system_discovery]
action = search
search = index=windows sourcetype=WinEventLog:Sysmon EventCode=1
  Image IN ("*\\ping.exe", "*\\nslookup.exe", "*\\tracert.exe")
| stats count by Computer, User, Image, CommandLine | where count > 20
| eval risk_score=40
| table _time Computer User Image CommandLine count risk_score
| description Detects suspicious network reconnaissance patterns (high volume warning)

# Rule 9: Domain Account Discovery via net Commands (T1087.002)
[domain_account_discovery]
action = search
search = index=windows sourcetype=WinEventLog:Sysmon EventCode=1
  Image="*\\net.exe"
  (CommandLine="*user*" OR CommandLine="*user /domain*"
    OR CommandLine="*group*" OR CommandLine="*group /domain*")
| stats count by Computer, User, CommandLine | where count > 10
| eval risk_score=45
| where NOT (User="DOMAIN\\ITAdmin")
| table _time Computer User Image CommandLine count risk_score
| description Detects domain account enumeration for privilege escalation prep

# ============================================================================
# LATERAL MOVEMENT RULES (1 rule)
# ============================================================================

# Rule 10: SMB/Windows Admin Shares Lateral Movement (T1021.002)
[smb_admin_shares_lateral]
action = search
search = index=windows sourcetype=WinEventLog:Sysmon EventCode=3
  DestinationPort="445"
  (DestinationHostname="*ADMIN$*" OR DestinationHostname="*C$*" OR DestinationHostname="*IPC$*")
| eval risk_score=75
| where NOT (Image="*\\svchost.exe")
  AND NOT (User="DOMAIN\\Administrator")
| table _time Computer User Image DestinationIp DestinationPort DestinationHostname risk_score
| sort - _time
| description Detects lateral movement via Windows admin shares

# ============================================================================
# ADVANCED TECHNIQUES RULES (2 rules)
# ============================================================================

# Rule 11: Unsigned or Suspicious Driver Loaded (T1014)
[unsigned_driver_loaded]
action = search
search = index=windows sourcetype=WinEventLog:Sysmon EventCode=6
  (Signed="false"
    OR ImageLoaded IN ("*\\Temp\\*", "*\\AppData\\*", "*\\Downloads\\*", "*\\Desktop\\*"))
| eval risk_score=95
| where NOT (ImageLoaded="C:\\Windows\\System32\\drivers\\test.sys")
  AND NOT (Image="*\\svchost.exe" AND ImageLoaded="C:\\Windows\\System32\\drivers\\*.sys")
| table _time Computer User Image ImageLoaded Signed risk_score
| sort - _time
| description Critical alert - unsigned or suspicious driver loading (rootkit detection)

# Rule 12: DLL Side-Loading via Known Vulnerable Applications (T1574.002)
[dll_sideloading]
action = search
search = index=windows sourcetype=WinEventLog:Sysmon EventCode=7
  ImageLoaded IN ("*.dll", "*.exe")
  ImageLoaded IN ("*\\Temp\\*", "*\\AppData\\Local\\Temp\\*", "*\\Downloads\\*", "*\\Desktop\\*")
  Image IN ("*\\svchost.exe", "*\\explorer.exe", "*\\notepad.exe", "*\\winword.exe",
    "*\\excel.exe", "*\\powerpnt.exe", "*\\outlook.exe")
| eval risk_score=70
| where NOT (Image="*\\svchost.exe" AND ImageLoaded="C:\\Windows\\System32\\*.dll")
  AND NOT (ImageLoaded="C:\\Windows\\Temp\\*.dll")
| table _time Computer User Image ImageLoaded risk_score
| sort - _time
| description Detects DLL side-loading attempts for code execution

# ============================================================================
# END OF EXPANDED RULES
# ============================================================================
